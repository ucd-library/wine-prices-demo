services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wine_prices
      POSTGRES_USER: wine
      POSTGRES_PASSWORD: wine
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./schema/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wine -d wine_prices"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: node services/api/index.js
    restart: always
    env_file: .env
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - images:/data/images

  harvester:
    build: .
    env_file: .env
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - images:/data/images

  extractor:
    build: .
    env_file: .env
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - images:/data/images

volumes:
  pg_data:
  images:
